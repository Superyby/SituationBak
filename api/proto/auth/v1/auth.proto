syntax = "proto3";

package auth.v1;

option go_package = "SituationBak/api/gen/auth/v1;authv1";

// 认证服务
service AuthService {
  // 用户注册
  rpc Register(RegisterRequest) returns (LoginResponse);
  // 用户登录
  rpc Login(LoginRequest) returns (LoginResponse);
  // 刷新Token
  rpc RefreshToken(RefreshTokenRequest) returns (TokenResponse);
  // 验证Token (内部调用)
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  // 获取当前用户信息
  rpc GetCurrentUser(GetCurrentUserRequest) returns (UserInfo);
}

// 注册请求
message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

// 登录请求
message LoginRequest {
  string username = 1;  // 用户名或邮箱
  string password = 2;
}

// 刷新Token请求
message RefreshTokenRequest {
  string refresh_token = 1;
}

// 验证Token请求
message ValidateTokenRequest {
  string access_token = 1;
}

// 验证Token响应
message ValidateTokenResponse {
  bool valid = 1;
  uint64 user_id = 2;
  string username = 3;
  string role = 4;
}

// 获取当前用户请求
message GetCurrentUserRequest {
  uint64 user_id = 1;
}

// 登录响应
message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  string token_type = 3;
  int64 expires_in = 4;
  UserInfo user = 5;
}

// Token响应
message TokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  string token_type = 3;
  int64 expires_in = 4;
}

// 用户信息
message UserInfo {
  uint64 id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
  string avatar_url = 5;
  string created_at = 6;
}
